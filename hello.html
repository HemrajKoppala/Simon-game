<!DOCTYPE html>
<html>
<head>
  <style>
    /* Background overlay */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    /* Popup box */
    .popup {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      position: relative;
      text-align: center;
    }

    /* Close button */
    .close {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<button onclick="openPopup()">Open Banner</button>

<div id="overlay" class="overlay">
  <div class="popup">
    <span class="close" onclick="closePopup()">❌</span>
    <h2>Welcome!</h2>
    <p>This is your banner content in the center.</p>
  </div>
</div>

<script>
  function openPopup() {
    document.getElementById("overlay").style.display = "flex";
  }

  function closePopup() {
    document.getElementById("overlay").style.display = "none";
  }
</script>

</body>
</html>
